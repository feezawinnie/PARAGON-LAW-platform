    <link rel="preconnect" href="https://fonts.googleapis.com" />

      html {

      html.dark {

      if (localStorage.getItem("theme") === "light") {
        document.documentElement.classList.remove("dark");
      } else {
        document.documentElement.classList.add("dark");
      }
    </script>
